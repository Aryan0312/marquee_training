<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms in html</title>

    <style>
        input{
            border: none;
            border-bottom: 2px solid black;
            border-bottom-style: dotted;
        }
        li{
            margin-bottom: 10px;
        }
        fieldset{
            margin-bottom: 10px;
        }

        #fileUpload{
            border: none;
        }
    </style>
</head>
<body>
    <h2>forms in html</h2>

    <form action="actionPage.html" method="get">
        <fieldset>
            <legend>Athlete Information</legend>
            <ul>
                <li><label for="name">Name:</label>
            <input type="text" value="" id="name" placeholder="enter your name..." required></li>

                <li><label for="School">School/Team:</label>
            <input type="text" value="" id="School" placeholder="enter your school or team" required></li>

            <li><label for="Sport">Sport:</label>
            <input type="text" value="" id="Sport" placeholder="enter your sport" required></li>

            <li><label for="Parent">Parent/Guardian Name:</label>
            <input type="text" value="" id="Parent" placeholder="enter parent name" required></li>

            <li><label for="Contact">Contact Number:</label>
            <input type="text" value="" id="Contact" placeholder="enter your contact " required></li>
            </ul>
        </fieldset>

        <fieldset>
            <legend>Medical History for Athletes</legend>
            <ul>
                <li>
                    <label for="concussion">History of Concussion</label>
                    <input type="radio" name="concussion" id="yes" value="yes" required>
                    <label for="yes">Yes</label>
                    <input type="radio" name="concussion" id="no" value="no" required>
                    <label for="no">No</label>
                </li>
                
                <li>
                    <label for="pinjuries">Previous injuries?</label>
                    <input type="radio" name="pinjuries" id="yes1" value="yes" required>
                    <label for="yes1">Yes</label>
                    <input type="radio" name="pinjuries" id="no1" value="no" required>
                    <label for="no1">No</label>
                </li>
                
                <li>
                    <label for="bone">Any Bone Fracture?</label>
                    <input type="radio" name="bone" id="yes2" value="yes" required>
                    <label for="yes2">Yes</label>
                    <input type="radio" name="bone" id="no2" value="no" required>
                    <label for="no2">No</label>
                </li>
            </ul>
        </fieldset>

        <fieldset>
        <legend>Date/Time</legend>
        <ul>
            <li>
                <label for = "dob">DOB</label>
                <input type="date" name = "dob" id = "dob" />

            </li>
            <li>
                <label for = "tem">Time</label>
                <input type="time" name = "tem" id = "tem" />
                
            </li>
        </ul>
      </fieldset>


      <fieldset>
        <legend>
            file input
        </legend>
        <label for="fileUpload"> Upload your files:</label>
        <input type="file" name="gameFile" id="fileUpload" accept=".pdf,.html">
      </fieldset>

      <fieldset>
        <legend>Terms and Conditions</legend>
        <input type="checkbox" id="checkbox">
        <label for="checkbox">i agree to the terms and Conditions</label>
      </fieldset>

        <button type="submit"> submit </button>
        <button type="reset"> reset </button>
    </form>
</body>
</html>
